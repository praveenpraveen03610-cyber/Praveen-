<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">

body{

}

.box{
background:rgba(0,0,0,0.6);

margin-top:80px;
border-radius:15px;

}

button{

font-size:18px;

}

#yes{

#message{

</style></head><body><h1>Hi Bujjikutty ❤️</h1><div class="box"><h2>Bujjikutty un kitta oru secret sollanum… sollata? 🤫</h2><button onclick="showLove()">Open Secret</button>

<div id="message">

</div><div id="kiss">😘😘😘</div></div><audio autoplay loop>
<source src="song.mp3" type="audio/mp3">
</audio><script>

</html>
